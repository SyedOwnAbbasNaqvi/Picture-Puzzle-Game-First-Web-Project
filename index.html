<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0"/>

  <title>Picture Puzzle Game</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🧩 Picture Puzzle Game</h1>

  <!-- TOP CONTROLS -->

  <div class="top-controls">

    <div class="saved-images">

      <img
      src="images/Scene.png"
      alt="scene in a river"
      class="saved-img active-image"
      onclick="selectDefaultImage(this)">

      <img
      src="images/playground.png"
      alt="playground"
      class="saved-img"
      onclick="selectDefaultImage(this)">

      <img
      src="images/ferocious-wild-tiger-nature.jpg"
      alt="Tiger"
      class="saved-img"
      onclick="selectDefaultImage(this)">

    </div>

       <!-- CUSTOM FILE INPUT -->

    <input
    type="file"
    id="uploadInput"
    accept="image/*">

    <select id="difficulty">

      <option value="3">
        Easy (3x3)
      </option>

      <option value="4" selected>
        Medium (4x4)
      </option>

      <option value="5">
        Hard (5x5)
      </option>

    </select>

 <!-- PLAYER NAME -->

    <input
    type="text"
    id="playerName"
    placeholder="Enter your name"
    required>

    <button id="startBtn">
      🚀 Start Game
    </button>

  </div>
