<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0"/>

  <title>Picture Puzzle Game</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🧩 Picture Puzzle Game</h1>

  <!-- TOP CONTROLS -->

  <div class="top-controls">

    <div class="saved-images">

      <img
      src="images/Scene.png"
      alt="scene in a river"
      class="saved-img active-image"
      onclick="selectDefaultImage(this)">

      <img
      src="images/playground.png"
      alt="playground"
      class="saved-img"
      onclick="selectDefaultImage(this)">

      <img
      src="images/ferocious-wild-tiger-nature.jpg"
      alt="Tiger"
      class="saved-img"
      onclick="selectDefaultImage(this)">

    </div>

       <!-- CUSTOM FILE INPUT -->

    <input
    type="file"
    id="uploadInput"
    accept="image/*">

    <select id="difficulty">

      <option value="3">
        Easy (3x3)
      </option>

      <option value="4" selected>
        Medium (4x4)
      </option>

      <option value="5">
        Hard (5x5)
      </option>

    </select>

 <!-- PLAYER NAME -->

    <input
    type="text"
    id="playerName"
    placeholder="Enter your name"
    required>

    <button id="startBtn">
      🚀 Start Game
    </button>

  </div>
    <!-- GAME LAYOUT -->

  <div class="game-layout">

    <!-- LEFT SIDEBAR -->

    <div class="piece-sidebar">

      <h2>🧩 Puzzle Pieces</h2>

      <div id="pieceTray"></div>

    </div>

    <!-- CENTER BOARD -->

    <div id="puzzleBoard"></div>

    <!-- RIGHT SIDEBAR -->

    <div class="sidebar">

      <h2>🖼 Reference Image</h2>

      <img id="referenceImage">

      <div class="stats">

        <p>
          ⏱ Time:
          <span id="timer">0</span>s
        </p>

        <p>
          🎯 Moves:
          <span id="moves">0</span>
        </p>

        <p>
          ⭐ Progress:
          <span id="progress">0</span>%
        </p>

      </div>

      <div class="rules">

        <h3>Game Rules</h3>

        <ul>
          <li>Drag pieces from left sidebar</li>
          <li>Drop into correct cells</li>
          <li>Wrong pieces can be moved again</li>
          <li>Complete puzzle to win</li>
        </ul>

      </div>

      <div class="leaderboard">

        <h3>🏆 Leaderboard</h3>

        <div id="leaderboardList"></div>

      </div>

    </div>

  </div>
